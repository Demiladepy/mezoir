  <text x="410" y="172" text-anchor="middle" fill="#425466" font-family="system-ui,sans-serif" font-size="14">Vite + React / Vercel</text>

  <rect x="620" y="120" width="180" height="80" rx="12" fill="#fafbff" stroke="#425466" stroke-width="2"/>

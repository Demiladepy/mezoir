# Optional Render Blueprint — or set the same values in the Render dashboard.
services:
  - type: web
    name: mezoir-agent
    runtime: python
    rootDir: agent
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.10"
